<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBAZ | R1 Protocol Verifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); }
        .trophy-border { border: 1px solid rgba(255,255,255,0.1); }
        .success-glow { box-shadow: 0 0 50px -10px rgba(16,185,129,0.2); }
        .fail-glow { box-shadow: 0 0 50px -10px rgba(239,68,68,0.2); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen flex flex-col items-center p-6">
<main class="max-w-2xl w-full space-y-8 py-12">
    <header class="text-center space-y-2">
        <h1 class="text-white text-4xl font-bold tracking-tighter">GUBAZ R1</h1>
        <p class="text-zinc-500 text-sm uppercase tracking-[0.3em]">Portable Execution Proof</p>
    </header>

    <div id="status-card" class="glass trophy-border rounded-3xl p-8 space-y-8 transition-all duration-500">
        <div class="flex flex-col items-center text-center space-y-4">
            <div id="status-icon" class="w-16 h-16 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center">
                <div class="w-6 h-6 rounded-full bg-zinc-700 animate-pulse"></div>
            </div>
            <div class="space-y-1">
                <h2 id="status-text" class="text-2xl font-bold text-white tracking-tight">Idle</h2>
                <p id="status-desc" class="text-zinc-500 text-sm italic">Waiting for proof or identifier</p>
            </div>
        </div>

        <!-- RESOLUTION SOURCE SECTION -->
        <div id="source-section" class="hidden space-y-3 pt-6 border-t border-zinc-900">
             <div class="flex items-center justify-between">
                <label class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Resolution Source</label>
                <span id="source-tier" class="text-[9px] bg-zinc-800 text-zinc-400 px-2 py-0.5 rounded-full uppercase">Tier -</span>
             </div>
             <div class="p-3 bg-zinc-900/50 rounded-xl border border-zinc-800/50">
                <p id="source-descriptor" class="text-white text-xs font-bold mb-1">---</p>
                <p id="source-origin" class="text-zinc-500 mono text-[10px] truncate">---</p>
             </div>
        </div>

        <div id="details-section" class="hidden space-y-6 pt-6 border-t border-zinc-900">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Command</label>
                    <p id="detail-command" class="text-zinc-200 mono text-sm break-all">---</p>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Exit Status</label>
                    <p id="detail-exit" class="text-zinc-200 text-sm font-bold">---</p>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Execution ID</label>
                    <p id="detail-hash" class="text-zinc-500 mono text-[10px] truncate">---</p>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-zinc-600 uppercase font-bold tracking-widest">Signer</label>
                    <p id="detail-signer" class="text-zinc-500 mono text-[10px] truncate">---</p>
                </div>
            </div>
        </div>

        <!-- MANUAL IMPORT UI -->
        <div id="manual-import-ui" class="hidden space-y-4 pt-6 border-t border-zinc-900">
            <textarea id="manual-paste" placeholder="Paste proof JSON here..." class="w-full h-32 bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-xs mono text-zinc-400 focus:outline-none focus:border-zinc-700 transition-colors"></textarea>
            <div class="flex gap-3">
                <button onclick="handleManualPaste()" class="flex-1 bg-white text-black font-bold py-2 rounded-xl text-sm hover:bg-zinc-200 transition-colors">Import JSON</button>
                <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(event)">
                <button onclick="document.getElementById('file-input').click()" class="flex-1 border border-zinc-800 font-bold py-2 rounded-xl text-sm hover:bg-zinc-900 transition-colors">Select File</button>
            </div>
        </div>
    </div>
</main>

<script src="verifier-browser.js"></script>
<script>
const ICONS = {
    IDLE: '<div class="w-6 h-6 rounded-full bg-zinc-700"></div>',
    RESOLVING: '<div class="w-6 h-6 rounded-full bg-zinc-700 animate-pulse"></div>',
    SUCCESS: '<svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
    FAIL: '<svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
    INFO: '<svg class="w-8 h-8 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
};

function resetUI(){
    const card = document.getElementById('status-card');
    card.classList.remove('success-glow','fail-glow');
    document.getElementById('status-text').className="text-2xl font-bold text-white tracking-tight";
    document.getElementById('source-section').classList.add('hidden');
    document.getElementById('details-section').classList.add('hidden');
    document.getElementById('manual-import-ui').classList.add('hidden');
}

function renderState(state, data) {
    resetUI();
    const icon = document.getElementById('status-icon');
    const text = document.getElementById('status-text');
    const desc = document.getElementById('status-desc');

    switch(state) {
        case 'idle':
            icon.innerHTML = ICONS.IDLE;
            text.innerText = "No Proof Provided";
            desc.innerText = "Enter a proof, URL, or execution ID to begin.";
            document.getElementById('manual-import-ui').classList.remove('hidden');
            break;
        case 'resolving':
            icon.innerHTML = ICONS.RESOLVING;
            text.innerText = "Resolving...";
            desc.innerText = "Searching for proof bytes across ladders";
            break;
        case 'proof_loaded':
            icon.innerHTML = ICONS.INFO;
            text.innerText = "Proof Resolved";
            desc.innerText = "Verifying cryptographic identity...";
            showSource(data);
            break;
    }
}

function showSource(res) {
    document.getElementById('source-section').classList.remove('hidden');
    document.getElementById('source-tier').innerText = "Tier " + (res.source_tier !== null ? res.source_tier : "-");
    document.getElementById('source-descriptor').innerText = "Resolved from " + (res.source_descriptor || "unknown source").replace(/_/g, ' ');
    document.getElementById('source-origin').innerText = res.source_origin || "direct input";
}

function renderSuccess(proof, res){
    renderState('proof_loaded', res);
    const card = document.getElementById('status-card');
    card.classList.add('success-glow');
    document.getElementById('status-icon').innerHTML = ICONS.SUCCESS;
    document.getElementById('status-text').innerText = "Verified Proof";
    document.getElementById('status-text').className = "text-2xl font-bold text-emerald-500 tracking-tight";
    document.getElementById('status-desc').innerText = "Signature valid. Identity matches.";

    document.getElementById('details-section').classList.remove('hidden');
    const core = proof.execution_core;
    document.getElementById('detail-command').innerText = core.command.join(' ');
    document.getElementById('detail-exit').innerText = core.exit_code === 0 ? "Success (0)" : "Failed (" + core.exit_code + ")";
    document.getElementById('detail-hash').innerText = proof.execution_id;
    document.getElementById('detail-signer').innerText = proof.signer.key_id || (proof.signer.pubkey ? proof.signer.pubkey.slice(0, 10) : "---");
}

function renderResolutionFail(res){
    resetUI();
    const card = document.getElementById('status-card');
    card.classList.add('fail-glow');
    document.getElementById('status-icon').innerHTML = ICONS.FAIL;
    document.getElementById('status-text').innerText = "Resolution Failed";
    document.getElementById('status-text').className = "text-2xl font-bold text-red-500 tracking-tight";
    document.getElementById('status-desc').innerText = (res.error_class || "unknown").replace(/_/g, ' ') + ": " + (res.error_detail || "");
    document.getElementById('manual-import-ui').classList.remove('hidden');

    // FIX 8: Always show source provenance if tier or descriptor is known
    if (res.source_tier !== null || res.source_descriptor !== null) {
        showSource(res);
    }
}

function renderVerifyFail(verdict){
    // Keep source visible if it was resolved
    const card = document.getElementById('status-card');
    card.classList.add('fail-glow');
    document.getElementById('status-icon').innerHTML = ICONS.FAIL;
    document.getElementById('status-text').innerText = "Invalid Proof";
    document.getElementById('status-text').className = "text-2xl font-bold text-red-500 tracking-tight";
    document.getElementById('status-desc').innerText = (verdict.failure_class || "verification_failed").replace(/_/g, ' ') + ": " + (verdict.message || "");
}

async function handleManualPaste() {
    const json = document.getElementById('manual-paste').value.trim();
    if (!json) return;
    if (window.resolveManual) await window.resolveManual(json);
}

function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const json = e.target.result;
        if (window.resolveManual) await window.resolveManual(json);
    };
    reader.readAsText(file);
}
</script>
</body>
</html>
